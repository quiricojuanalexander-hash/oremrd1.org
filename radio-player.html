<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Radio Masada</title>

<style>
body {
    background: #111;
    color: white;
    font-family: Arial;
    text-align: center;
    padding-top: 100px;
}

.player {
    background: #222;
    padding: 20px;
    border-radius: 10px;
    display: inline-block;
}

button {
    padding: 10px 20px;
    margin: 10px;
    border: none;
    border-radius: 5px;
    background: orange;
    color: white;
    cursor: pointer;
}
</style>

</head>
<body>

<div class="player">
    <h2>📻 Radio Masada</h2>
    
    <audio id="radio" src="https://uk16freenew.listen2myradio.com/live.mp3?typeportmount=s1_12175_stream_392356682"></audio>

    <br>

    <button onclick="playRadio()">▶ Play</button>
    <button onclick="pauseRadio()">⏸ Pause</button>
</div>

<script>
function playRadio() {
    document.getElementById("radio").play();
}

function pauseRadio() {
    document.getElementById("radio").pause();
}
</script>

</body>
</html>
